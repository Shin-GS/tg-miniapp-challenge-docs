<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Report</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="report-manifest.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f9fafb;
  --surface: #ffffff;
  --surface-hover: #f3f4f6;
  --border: #e5e7eb;
  --text: #111827;
  --text-muted: #6b7280;
  --accent: #3b82f6;
  --accent-dim: #dbeafe;
  --sidebar-w: 220px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px 12px;
}

.back-link {
  display: inline-block;
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
  margin-bottom: 4px;
}

.back-link:hover { color: var(--text); }

.header-main {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
}

.tabs {
  display: flex;
  gap: 4px;
  margin-left: 24px;
}

.tab {
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  border: 1px solid transparent;
  background: none;
  transition: all 0.15s;
}

.tab:hover { color: var(--text); background: var(--surface-hover); }
.tab.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

.nav-arrows {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.nav-arrows button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.nav-arrows button:hover { border-color: var(--accent); color: var(--accent); }
.nav-arrows button:disabled { opacity: 0.3; cursor: not-allowed; }

.nav-current {
  font-size: 14px;
  color: var(--text-muted);
  min-width: 100px;
  text-align: center;
}

/* Layout */
.layout {
  display: flex;
  height: calc(100vh - 72px);
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar-group {
  margin-bottom: 4px;
}

.sidebar-group-title {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.sidebar-group-title:hover { color: var(--text); }
.sidebar-group-title::before {
  content: '▾';
  font-size: 10px;
  transition: transform 0.15s;
}
.sidebar-group.collapsed .sidebar-group-title::before { transform: rotate(-90deg); }
.sidebar-group.collapsed .sidebar-items { display: none; }

.sidebar-item {
  padding: 6px 16px 6px 28px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar-item:hover { color: var(--text); background: var(--surface-hover); }
.sidebar-item.active { color: var(--accent); background: var(--accent-dim); font-weight: 500; }

.sidebar-count {
  padding: 12px 16px;
  font-size: 11px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

/* Content */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
}

.content .markdown-body {
  font-size: 15px;
  line-height: 1.7;
  max-width: 800px;
}

.markdown-body h1 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text);
}

.markdown-body h2 {
  font-size: 18px;
  font-weight: 600;
  margin-top: 32px;
  margin-bottom: 12px;
  color: var(--text);
}

.markdown-body ul, .markdown-body ol {
  padding-left: 20px;
  margin-bottom: 16px;
}

.markdown-body li {
  margin-bottom: 6px;
}

.markdown-body p {
  margin-bottom: 12px;
}

.markdown-body strong { color: var(--text); font-weight: 600; }
.markdown-body del { color: var(--text-muted); }

.markdown-body code {
  background: var(--surface-hover);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}

.markdown-body pre {
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin-bottom: 16px;
}

.markdown-body a {
  color: var(--accent);
  text-decoration: none;
}
.markdown-body a:hover { text-decoration: underline; }

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: var(--text-muted);
  font-size: 16px;
}

/* Mobile */
.mobile-select {
  display: none;
  margin-left: 12px;
}

.mobile-select select {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 14px;
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .mobile-select { display: block; }
  .content { padding: 20px 16px; }
  .header h1 { font-size: 16px; }
  .nav-arrows { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <a href="../index.html" class="back-link">← Docs Hub</a>
  <div class="header-main">
    <h1>📊 Operations Report</h1>
    <div class="tabs">
      <button class="tab active" data-tab="daily">Daily</button>
      <button class="tab" data-tab="weekly">Weekly</button>
    </div>
    <div class="mobile-select">
      <select id="mobileNav"></select>
    </div>
    <div class="nav-arrows">
      <button id="navPrev" title="Previous (←)">◀</button>
      <span class="nav-current" id="navCurrent"></span>
      <button id="navNext" title="Next (→)">▶</button>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content">
    <div class="markdown-body" id="markdownBody">
      <div class="empty-state">리포트를 선택하세요</div>
    </div>
  </main>
</div>

<script>
(function() {
  const manifest = window.REPORT_MANIFEST;
  let currentTab = 'daily';
  let currentIndex = -1;

  const sidebar = document.getElementById('sidebar');
  const body = document.getElementById('markdownBody');
  const navPrev = document.getElementById('navPrev');
  const navNext = document.getElementById('navNext');
  const navCurrent = document.getElementById('navCurrent');
  const mobileNav = document.getElementById('mobileNav');
  const tabs = document.querySelectorAll('.tab');

  // --- Helpers ---
  function getList() { return manifest[currentTab] || []; }

  function getMonthKey(entry) {
    if (currentTab === 'daily') return entry.substring(0, 7); // 2026-06
    // weekly: 2026-W24 → year-month 근사치
    const [year, wPart] = entry.split('-');
    const weekNum = parseInt(wPart.replace('W', ''));
    const month = Math.ceil(weekNum / 4.33);
    return `${year}-${String(month).padStart(2, '0')}`;
  }

  function formatMonthLabel(key) {
    const [year, month] = key.split('-');
    const months = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${months[parseInt(month)]} ${year}`;
  }

  function formatItemLabel(entry) {
    if (currentTab === 'daily') {
      const d = new Date(entry + 'T00:00:00');
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      const day = entry.split('-')[2];
      return `${parseInt(day)}일 (${days[d.getDay()]})`;
    }
    return entry; // W24, W25...
  }

  // --- Sidebar ---
  function renderSidebar() {
    const list = getList();
    const groups = {};
    list.forEach((entry, idx) => {
      const key = getMonthKey(entry);
      if (!groups[key]) groups[key] = [];
      groups[key].push({ entry, idx });
    });

    // 최신 월이 위에 오도록 역순
    const sortedKeys = Object.keys(groups).sort().reverse();

    sidebar.innerHTML = sortedKeys.map(key => {
      const items = groups[key].sort((a, b) => b.idx - a.idx); // 최신 날짜 위
      return `
        <div class="sidebar-group" data-month="${key}">
          <div class="sidebar-group-title">${formatMonthLabel(key)}</div>
          <div class="sidebar-items">
            ${items.map(({ entry, idx }) => `
              <div class="sidebar-item" data-index="${idx}">${formatItemLabel(entry)}</div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('') + `<div class="sidebar-count">${list.length}개 리포트</div>`;

    // 이벤트
    sidebar.querySelectorAll('.sidebar-group-title').forEach(el => {
      el.addEventListener('click', () => {
        el.parentElement.classList.toggle('collapsed');
      });
    });

    sidebar.querySelectorAll('.sidebar-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.index);
        loadReport(idx);
      });
    });
  }

  // --- Mobile Nav ---
  function renderMobileNav() {
    const list = getList();
    mobileNav.innerHTML = list.map((entry, idx) =>
      `<option value="${idx}">${entry}</option>`
    ).reverse().join('');
  }

  mobileNav.addEventListener('change', () => {
    loadReport(parseInt(mobileNav.value));
  });

  // --- Load Report ---
  async function loadReport(index) {
    const list = getList();
    if (index < 0 || index >= list.length) return;
    currentIndex = index;

    const entry = list[index];
    const path = `${currentTab}/${entry}.md`;

    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`${res.status}`);
      const md = await res.text();
      body.innerHTML = marked.parse(md);
    } catch (e) {
      body.innerHTML = `<div class="empty-state">파일을 불러올 수 없습니다: ${path}</div>`;
    }

    updateUI();
    updateHash();
  }

  function updateUI() {
    const list = getList();
    // Sidebar active
    sidebar.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.index) === currentIndex);
    });
    // Nav
    navPrev.disabled = currentIndex <= 0;
    navNext.disabled = currentIndex >= list.length - 1;
    navCurrent.textContent = list[currentIndex] || '';
    // Mobile
    mobileNav.value = currentIndex;
  }

  // --- Navigation ---
  navPrev.addEventListener('click', () => { if (currentIndex > 0) loadReport(currentIndex - 1); });
  navNext.addEventListener('click', () => { if (currentIndex < getList().length - 1) loadReport(currentIndex + 1); });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowLeft') { navPrev.click(); e.preventDefault(); }
    if (e.key === 'ArrowRight') { navNext.click(); e.preventDefault(); }
  });

  // --- Tabs ---
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderSidebar();
      renderMobileNav();
      // 최신(마지막) 항목 로드
      const list = getList();
      if (list.length > 0) {
        loadReport(list.length - 1);
      } else {
        body.innerHTML = '<div class="empty-state">리포트가 없습니다</div>';
        currentIndex = -1;
        updateUI();
      }
      updateHash();
    });
  });

  // --- Hash Routing ---
  function updateHash() {
    const list = getList();
    if (currentIndex >= 0 && list[currentIndex]) {
      location.hash = `${currentTab}/${list[currentIndex]}`;
    }
  }

  function parseHash() {
    const hash = location.hash.replace('#', '');
    if (!hash) return null;
    const [tab, entry] = [hash.split('/')[0], hash.split('/').slice(1).join('/')];
    if (tab && entry && manifest[tab]) {
      const idx = manifest[tab].indexOf(entry);
      if (idx >= 0) return { tab, index: idx };
    }
    return null;
  }

  window.addEventListener('hashchange', () => {
    const parsed = parseHash();
    if (parsed) {
      if (parsed.tab !== currentTab) {
        currentTab = parsed.tab;
        tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
        renderSidebar();
        renderMobileNav();
      }
      loadReport(parsed.index);
    }
  });

  // --- Init ---
  function init() {
    const parsed = parseHash();
    if (parsed) {
      currentTab = parsed.tab;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
      renderSidebar();
      renderMobileNav();
      loadReport(parsed.index);
    } else {
      renderSidebar();
      renderMobileNav();
      const list = getList();
      if (list.length > 0) loadReport(list.length - 1);
    }
  }

  init();
})();
</script>
</body>
</html>
